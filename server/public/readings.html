<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="LEDger">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#f4f8f5">
  <link rel="icon" type="image/png" href="icon.png">
  <link rel="apple-touch-icon" href="icon.png">
  <link rel="manifest" href="manifest.json">
  <title>Meter Readings — LEDger</title>
  <style>
    :root {
      --bg:        #f4f8f5;
      --surface:   #ffffff;
      --surface2:  #eaf3ec;
      --border:    #c8ddd0;
      --green:     #3a9d5c;
      --green-dim: #2d8049;
      --green-bright: #5cb878;
      --text:      #2c3e35;
      --text-dim:  #6b8f7b;
      --yellow:    #d4940a;
      --red:       #c93b3b;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    .container {
      max-width: 960px;
      margin: 0 auto;
      padding: 24px 16px;
    }

    header {
      text-align: center;
      margin-bottom: 32px;
    }

    header h1 {
      font-size: 1.5rem;
      font-weight: 600;
      color: var(--green);
      letter-spacing: -0.02em;
    }

    header .subtitle {
      color: var(--text-dim);
      font-size: 0.85rem;
      margin-top: 4px;
    }

    header .subtitle a {
      color: var(--green);
      text-decoration: none;
    }

    header .subtitle a:hover {
      text-decoration: underline;
    }

    /* ── Sections ────────────────────────────────── */

    .section {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 16px;
    }

    .section h2 {
      font-size: 0.95rem;
      font-weight: 600;
      margin-bottom: 16px;
      color: var(--text);
    }

    /* ── Reading form ────────────────────────────── */

    .reading-form {
      display: flex;
      gap: 8px;
      align-items: center;
      margin-bottom: 16px;
    }

    .reading-form input {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 0.9rem;
      padding: 8px 12px;
      width: 160px;
      outline: none;
    }

    .reading-form input:focus {
      border-color: var(--green);
    }

    .reading-form button {
      background: var(--green);
      border: none;
      border-radius: 8px;
      color: #fff;
      font-size: 0.8rem;
      font-weight: 600;
      padding: 8px 16px;
      cursor: pointer;
      transition: background 0.15s;
    }

    .reading-form button:hover {
      background: var(--green-dim);
    }

    .reading-form .unit-label {
      font-size: 0.85rem;
      color: var(--text-dim);
    }

    .form-msg {
      font-size: 0.8rem;
      margin-bottom: 12px;
      min-height: 1.2em;
    }

    /* ── Readings table ────────────────────────── */

    .readings-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.85rem;
    }

    .readings-table th {
      text-align: left;
      color: var(--text-dim);
      font-weight: 500;
      padding: 8px 12px;
      border-bottom: 1px solid var(--border);
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .readings-table td {
      padding: 8px 12px;
      border-bottom: 1px solid rgba(200, 221, 208, 0.5);
    }

    .readings-table tr:last-child td {
      border-bottom: none;
    }

    .drift-pos { color: var(--red); }
    .drift-neg { color: var(--yellow); }
    .drift-zero { color: var(--text-dim); }
    .drift-first { color: var(--text-dim); font-style: italic; }

    .hint {
      font-size: 0.8rem;
      color: var(--text-dim);
      margin-bottom: 12px;
    }

    .loading {
      text-align: center;
      padding: 60px 0;
      color: var(--text-dim);
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>Meter Readings</h1>
      <p class="subtitle"><a href="./">&larr; Back to dashboard</a></p>
    </header>

    <div id="app" class="loading">Loading data...</div>
  </div>

  <script>
    const API_BASE = '/meter/api';

    async function fetchData() {
      try {
        const res = await fetch(`${API_BASE}/data`);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        return await res.json();
      } catch (err) {
        console.error('Fetch error:', err);
        return null;
      }
    }

    function formatKwh(wh) {
      if (wh >= 1000) return (wh / 1000).toFixed(1);
      return (wh / 1000).toFixed(2);
    }

    function formatMeter(wh) {
      return (wh / 1000).toFixed(1);
    }

    function formatDate(iso) {
      const d = new Date(iso);
      return d.toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' })
        + ' ' + d.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' });
    }

    function formatDrift(wh) {
      if (wh === null || wh === undefined) return '<span class="drift-first">first reading</span>';
      const kwh = (wh / 1000).toFixed(2);
      if (wh > 0) return `<span class="drift-pos">+${kwh} kWh (undercounted)</span>`;
      if (wh < 0) return `<span class="drift-neg">${kwh} kWh (overcounted)</span>`;
      return '<span class="drift-zero">0 (perfect)</span>';
    }

    function render(data) {
      const app = document.getElementById('app');
      app.classList.remove('loading');

      const readingsRows = data.readings.length > 0
        ? data.readings.map(r => `
            <tr>
              <td>${formatDate(r.timestamp)}</td>
              <td>${(r.reading_wh / 1000).toFixed(1)} kWh</td>
              <td>${formatDrift(r.drift_wh)}</td>
            </tr>
          `).join('')
        : '<tr><td colspan="3" style="color: var(--text-dim)">No readings yet. Enter your first meter reading below.</td></tr>';

      app.innerHTML = `
        <div class="section">
          <h2>Submit Reading</h2>
          <p class="hint">Enter the kWh value shown on your meter. The drift shows how much the pulse count was off since the previous reading.</p>
          <div class="reading-form">
            <input type="number" id="reading-input" step="0.1" placeholder="${formatMeter(data.meterReading)}">
            <span class="unit-label">kWh</span>
            <button onclick="submitReading()">Submit Reading</button>
          </div>
          <div id="form-msg" class="form-msg"></div>
        </div>

        <div class="section">
          <h2>Reading History</h2>
          <table class="readings-table">
            <thead>
              <tr>
                <th>Date</th>
                <th>Reading</th>
                <th>Drift</th>
              </tr>
            </thead>
            <tbody>
              ${readingsRows}
            </tbody>
          </table>
        </div>
      `;
    }

    let lastData = null;

    async function update() {
      const data = await fetchData();
      if (data) {
        lastData = data;
        render(data);
      }
    }

    async function submitReading() {
      const input = document.getElementById('reading-input');
      const msg = document.getElementById('form-msg');
      const value = parseFloat(input.value);

      if (isNaN(value) || value <= 0) {
        msg.style.color = 'var(--red)';
        msg.textContent = 'Please enter a valid kWh reading.';
        return;
      }

      const apiKey = prompt('Enter manual reading password:');
      if (!apiKey) return;

      try {
        const res = await fetch(`${API_BASE}/reading`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'X-API-Key': apiKey,
          },
          body: JSON.stringify({ readingKwh: value }),
        });

        if (!res.ok) {
          const err = await res.json();
          throw new Error(err.error || `HTTP ${res.status}`);
        }

        const result = await res.json();
        msg.style.color = 'var(--green)';
        const driftMsg = result.driftWh !== null
          ? ` Drift: ${(result.driftWh / 1000).toFixed(2)} kWh.`
          : '';
        msg.textContent = `Reading saved: ${value} kWh.${driftMsg}`;
        input.value = '';
        update();
      } catch (err) {
        msg.style.color = 'var(--red)';
        msg.textContent = `Error: ${err.message}`;
      }
    }

    update();
  </script>
</body>
</html>
